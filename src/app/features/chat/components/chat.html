<div class="flex h-screen flex-col bg-gray-950 text-white">


    <!-- Header -->

    <div class="border-b border-gray-800 p-5">

        <h1 class="text-xl font-bold">
            🕉 Shiva AI
        </h1>

        <p class="text-sm text-gray-400">
            Spiritual AI Assistant
        </p>

    </div>




    <!-- Messages -->


    <div class="flex-1 space-y-5 overflow-y-auto p-6">


        @for(message of messages; track $index){


        @if(message.role === 'user'){


        <div class="flex justify-end">


            <div class="max-w-xl rounded-2xl bg-green-600 px-5 py-3">

                {{message.content}}

            </div>


        </div>


        }


        @else{


        <div class="flex justify-start">


            <div class="max-w-xl rounded-2xl bg-gray-800 px-5 py-3">

                {{message.content}}

            </div>


        </div>


        }


        }



        @if (loading) {

        <div class="flex items-center gap-3">

            <div class="rounded-2xl bg-gray-800 px-5 py-4">

                <div class="flex gap-2">

                    <span class="h-2 w-2 animate-bounce rounded-full bg-green-500"></span>

                    <span class="h-2 w-2 animate-bounce rounded-full bg-green-500 [animation-delay:0.2s]"></span>

                    <span class="h-2 w-2 animate-bounce rounded-full bg-green-500 [animation-delay:0.4s]"></span>

                </div>

            </div>

        </div>

        }



    </div>




    <!-- Input -->


    <div class="border-t border-gray-800 p-5">


        <div class="flex gap-3">


            <input [(ngModel)]="message" (keyup.enter)="sendMessage()"
                class="flex-1 rounded-xl bg-gray-800 px-5 py-3 outline-none" placeholder="Ask Shiva AI...">


            <button (click)="sendMessage()" class="rounded-xl bg-green-600 px-6 text-white">

                Send

            </button>


        </div>


    </div>


</div>
